services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  frontend:
    build:
      context: ./sc-frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
    volumes:
      - ./docker-data/uploads:/app/public/uploads
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  backend:
    build:
      context: ./sc-backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=sqlite:///./data/supercenter.db
      - SECRET_KEY=${SECRET_KEY:-your-production-secret-key-change-this}
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./docker-data/database:/app/data
      - ./docker-data/uploads:/app/public/uploads
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
